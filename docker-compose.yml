version: '3.8'

services:

  mysql-db:
    image: mysql:8.0
    container_name: eventzen-mysql
    environment:
      MYSQL_ROOT_PASSWORD: WJ28@krhps
      MYSQL_DATABASE: eventzen_users
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  sqlserver-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: eventzen-sqlserver
    environment:
      SA_PASSWORD: "EventZen@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P EventZen@123 -Q 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-db:
    image: mongo:7
    container_name: eventzen-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  user-service:
    build: ./services/user-service
    container_name: eventzen-user-service
    ports:
      - "8080:8080"
    depends_on:
      mysql-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/eventzen_users?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123
      JWT_SECRET: eventzen_super_secret_key_2024_make_it_long
      JWT_EXPIRATION: 86400000

  event-service:
    build: ./services/event-service
    container_name: eventzen-event-service
    ports:
      - "5000:5000"
    depends_on:
      sqlserver-db:
        condition: service_healthy
    environment:
      ConnectionStrings__DefaultConnection: "Server=sqlserver-db;Database=eventzen_events;User Id=sa;Password=EventZen@123;TrustServerCertificate=true"

  booking-service:
    build: ./services/booking-service
    container_name: eventzen-booking-service
    ports:
      - "3000:3000"
    depends_on:
      mongo-db:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://mongo-db:27017/eventzen_bookings
      PORT: 3000
      JWT_SECRET: eventzen_super_secret_key_2024_make_it_long

  api-gateway:
    build: ./api-gateway
    container_name: eventzen-gateway
    ports:
      - "8000:8000"
    depends_on:
      - user-service
      - event-service
      - booking-service
    environment:
      PORT: 8000
      USER_SERVICE: http://user-service:8080
      EVENT_SERVICE: http://event-service:5000
      BOOKING_SERVICE: http://booking-service:3000

  frontend:
    build: ./frontend
    container_name: eventzen-frontend
    ports:
      - "3001:3001"
    depends_on:
      - api-gateway
    environment:
      NEXT_PUBLIC_GATEWAY_URL: http://localhost:8000

volumes:
  mysql_data:
  sqlserver_data:
  mongo_data: